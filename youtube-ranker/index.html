<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>유튜브 키워드 랭커 v4 — 서버 저장</title>
<style>
  :root{
    --bg:#F4F6F8; --card:#FFFFFF; --ink:#1B2432; --sub:#5B6472;
    --line:#E3E7EC; --accent:#E5484D; --accent-soft:#FDECEC;
    --gem:#0E8A6D; --gem-soft:#E4F5F0; --blue:#2B5FD9; --blue-soft:#EBF1FE;
    --amber:#B7791F; --amber-soft:#FBF3E4;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:"Apple SD Gothic Neo","Pretendard","Malgun Gothic",-apple-system,sans-serif;
    background:var(--bg); color:var(--ink); font-size:14px; line-height:1.55;
  }
  .wrap{max-width:1220px; margin:0 auto; padding:28px 20px 80px;}
  header h1{font-size:24px; font-weight:800; letter-spacing:-0.5px;}
  header h1 .dot{color:var(--accent);}
  header p{color:var(--sub); margin-top:4px; font-size:13px;}

  .tabs{display:flex; gap:6px; margin-top:20px; border-bottom:2px solid var(--line);}
  .tab{
    background:none; border:none; padding:10px 18px; font-size:15px; font-weight:700; color:var(--sub);
    cursor:pointer; border-bottom:3px solid transparent; margin-bottom:-2px; font-family:inherit;
  }
  .tab.on{color:var(--accent); border-bottom-color:var(--accent);}
  .tab:hover:not(.on){color:var(--ink);}
  .view{display:none;}
  .view.on{display:block;}

  .panel{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:18px 20px; margin-top:18px;}
  .row{display:flex; flex-wrap:wrap; gap:12px; align-items:flex-end;}
  .field{display:flex; flex-direction:column; gap:5px;}
  .field label{font-size:12px; font-weight:700; color:var(--sub);}
  input[type=text], input[type=password], select, textarea{
    border:1px solid var(--line); border-radius:8px; padding:9px 12px; font-size:14px;
    background:#FBFCFD; outline:none; min-width:0; font-family:inherit;
  }
  input:focus, select:focus, textarea:focus{border-color:var(--blue); background:#fff;}
  .grow{flex:1; min-width:220px;}
  button{
    border:none; border-radius:8px; padding:10px 20px; font-size:14px; font-weight:700;
    cursor:pointer; transition:opacity .15s; font-family:inherit;
  }
  button:focus-visible{outline:2px solid var(--blue); outline-offset:2px;}
  .btn-main{background:var(--accent); color:#fff;}
  .btn-main:hover{opacity:.88;}
  .btn-main:disabled{background:#C9CED6; cursor:not-allowed;}
  .btn-ghost{background:#fff; border:1px solid var(--line); color:var(--sub); padding:8px 14px; font-size:13px;}
  .btn-ghost:hover{border-color:var(--sub);}
  .hint{font-size:12px; color:var(--sub); margin-top:10px;}
  .hint a{color:var(--blue);}

  .keysaved{
    display:flex; align-items:center; gap:10px; background:var(--gem-soft);
    border:1px solid #C4E8DE; border-radius:8px; padding:9px 12px; font-size:13px; color:var(--gem); font-weight:700;
  }
  #keyBtn.key-ok{border-color:#C4E8DE; color:var(--gem); background:var(--gem-soft);}
  #keyBtn.key-need{border-color:var(--accent); color:var(--accent); background:var(--accent-soft);}
  .btn-more{
    width:100%; background:#fff; border:1px dashed var(--line); color:var(--sub);
    padding:9px; font-size:13px; border-radius:10px; margin-top:8px;
  }
  .btn-more:hover{border-color:var(--blue); color:var(--blue);}

  .filters{display:flex; flex-wrap:wrap; gap:12px; margin-top:14px; padding-top:14px; border-top:1px dashed var(--line);}

  .status{margin-top:16px; font-size:13px; color:var(--sub);}
  .status.error{color:var(--accent); font-weight:700;}
  .from-cache{display:inline-block; background:var(--blue-soft); color:var(--blue); font-size:11px; font-weight:800; padding:2px 8px; border-radius:10px; margin-left:6px;}

  .history-head{display:flex; justify-content:space-between; align-items:center;}
  .history-head h2{font-size:15px; font-weight:800;}
  .history-list{margin-top:12px; display:flex; flex-direction:column; gap:8px;}
  .hitem{
    display:flex; align-items:center; gap:12px; border:1px solid var(--line); border-radius:10px;
    padding:10px 14px; background:#FBFCFD; cursor:pointer; transition:border-color .12s, background .12s;
  }
  .hitem:hover{border-color:var(--blue); background:var(--blue-soft);}
  .hitem .kw{font-weight:800; font-size:14px;}
  .hitem .hmeta{font-size:12px; color:var(--sub); flex:1;}
  .hitem button{padding:6px 12px; font-size:12px;}
  .btn-del{background:#fff; border:1px solid var(--line); color:var(--sub);}
  .btn-del:hover{color:var(--accent); border-color:var(--accent);}
  .history-empty{color:var(--sub); font-size:13px; margin-top:10px;}

  table{width:100%; border-collapse:collapse; margin-top:14px; background:var(--card);
        border:1px solid var(--line); border-radius:12px; overflow:hidden;}
  thead th{
    text-align:left; font-size:12px; color:var(--sub); font-weight:700;
    padding:10px 12px; border-bottom:1px solid var(--line); background:#FAFBFC; white-space:nowrap;
  }
  thead th.sortable{cursor:pointer; user-select:none; transition:color .12s;}
  thead th.sortable:hover{color:var(--ink); background:#F1F4F8;}
  thead th.sortable.on{color:var(--accent);}
  thead th.sortable.on::after{content:" ▼"; font-size:9px;}
  tbody td{padding:12px; border-bottom:1px solid var(--line); vertical-align:middle;}
  tbody tr:last-child td{border-bottom:none;}
  tbody tr:hover{background:#FAFBFD;}
  .rank{font-weight:800; font-size:15px; color:var(--sub); width:40px; text-align:center;}
  .rank.top{color:var(--accent);}
  .thumb{width:120px; height:68px; object-fit:cover; border-radius:6px; display:block; background:#eee;}
  .vtitle{font-weight:700; font-size:14px; line-height:1.4; color:var(--ink); text-decoration:none; display:block;}
  .vtitle:hover{color:var(--accent);}
  .vmeta{font-size:12px; color:var(--sub); margin-top:3px;}
  .ch{font-size:13px; color:var(--ink); text-decoration:none; font-weight:600;}
  .ch:hover{text-decoration:underline;}
  .num{text-align:right; font-variant-numeric:tabular-nums; white-space:nowrap;}
  .badge-gem{
    display:inline-block; background:var(--gem-soft); color:var(--gem);
    font-size:11px; font-weight:800; padding:2px 8px; border-radius:10px; margin-left:6px;
  }
  .ratio-hi{color:var(--gem); font-weight:800;}
  .btn-cmt{background:var(--blue-soft); color:var(--blue); padding:6px 12px; font-size:12px; white-space:nowrap;}
  .btn-cmt:hover{opacity:.85;}
  .btn-cmt.cached::after{content:" ●"; font-size:9px;}
  .btn-contact{
    background:#fff; border:1px solid var(--line); color:var(--sub);
    padding:4px 10px; font-size:11px; margin-top:5px; white-space:nowrap;
  }
  .btn-contact:hover{border-color:var(--gem); color:var(--gem);}
  .btn-contact.has-rec{border-color:var(--gem); color:var(--gem); background:var(--gem-soft); font-weight:700;}

  .st-badge{display:inline-block; font-size:11px; font-weight:800; padding:2px 10px; border-radius:10px;}

  .overlay{
    position:fixed; inset:0; background:rgba(20,25,35,.55); display:none;
    align-items:center; justify-content:center; padding:20px; z-index:100;
  }
  .overlay.show{display:flex;}
  .modal{
    background:#fff; border-radius:14px; width:100%; max-width:680px; max-height:84vh;
    display:flex; flex-direction:column; overflow:hidden;
  }
  .modal-head{padding:16px 20px; border-bottom:1px solid var(--line); display:flex; gap:12px; align-items:flex-start;}
  .modal-head .mtitle{font-weight:800; font-size:15px; line-height:1.4; flex:1;}
  .modal-head .mtitle a{color:var(--ink); text-decoration:none;}
  .modal-head .mtitle a:hover{color:var(--accent);}
  .modal-head .msub{font-size:12px; color:var(--sub); margin-top:3px; font-weight:400;}
  .modal-close{background:none; border:none; font-size:22px; color:var(--sub); padding:0 4px; line-height:1;}
  .modal-body{overflow-y:auto; padding:6px 20px 20px;}
  .modal-loading{padding:40px; text-align:center; color:var(--sub);}

  .cmt{padding:14px 0; border-bottom:1px solid var(--line);}
  .cmt:last-child{border-bottom:none;}
  .cmt-top{display:flex; gap:8px; align-items:baseline; flex-wrap:wrap;}
  .cmt-author{font-weight:800; font-size:13px;}
  .cmt-date{font-size:12px; color:var(--sub);}
  .cmt-likes{font-size:12px; color:var(--sub);}
  .cmt-text{margin-top:5px; font-size:14px; white-space:pre-wrap; word-break:break-word;}
  .cmt-replies{font-size:12px; color:var(--blue); margin-top:4px; font-weight:700;}

  .contact-sec{margin-top:16px;}
  .contact-sec h3{font-size:12px; font-weight:800; color:var(--sub); margin-bottom:8px;}
  .contact-row{
    display:flex; align-items:center; gap:10px; border:1px solid var(--line);
    border-radius:8px; padding:8px 12px; margin-bottom:6px; background:#FBFCFD;
  }
  .contact-val{flex:1; font-size:13px; word-break:break-all; font-weight:600;}
  .contact-val b{color:var(--sub); font-weight:700; font-size:11px; margin-right:6px;}
  .contact-val a{color:var(--blue); text-decoration:none;}
  .contact-val a:hover{text-decoration:underline;}
  .copy-btn{background:var(--ink); color:#fff; padding:5px 12px; font-size:12px; white-space:nowrap; border-radius:6px;}
  .copy-btn.done{background:var(--gem);}
  .contact-desc{
    margin-top:8px; font-size:13px; color:var(--sub); white-space:pre-wrap; word-break:break-word;
    background:#FAFBFC; border:1px solid var(--line); border-radius:8px; padding:12px; max-height:220px; overflow-y:auto;
  }
  .contact-none{font-size:13px; color:var(--sub); padding:8px 0;}
  .btn-about{
    display:inline-block; background:var(--accent-soft); color:var(--accent); font-weight:700;
    font-size:12px; padding:7px 14px; border-radius:8px; text-decoration:none; margin-top:4px;
  }
  .memo-box textarea{width:100%; resize:vertical; min-height:70px; font-size:13px;}
  .memo-actions{display:flex; gap:8px; margin-top:8px; align-items:center; flex-wrap:wrap;}
  .btn-save{background:var(--gem); color:#fff; padding:7px 16px; font-size:13px;}
  .memo-note{font-size:12px; color:var(--sub);}
  .st-select{padding:7px 10px; font-size:13px; font-weight:700;}

  .crm-head{display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; margin-top:18px;}
  .crm-filters{display:flex; gap:8px; flex-wrap:wrap;}
  .fchip{
    background:#fff; border:1px solid var(--line); border-radius:20px; padding:6px 14px;
    font-size:13px; font-weight:700; color:var(--sub);
  }
  .fchip.on{background:var(--ink); color:#fff; border-color:var(--ink);}
  .card{
    background:var(--card); border:1px solid var(--line); border-radius:12px;
    padding:16px 18px; margin-top:14px;
  }
  .card-head{display:flex; align-items:center; gap:12px; flex-wrap:wrap;}
  .card-head .cname{font-size:16px; font-weight:800; color:var(--ink); text-decoration:none;}
  .card-head .cname:hover{color:var(--accent);}
  .card-head .cmeta{font-size:12px; color:var(--sub); flex:1;}
  .card-videos{display:flex; gap:10px; margin-top:12px; overflow-x:auto; padding-bottom:4px;}
  .cv{flex:0 0 150px; text-decoration:none; color:var(--ink);}
  .cv img{width:150px; height:84px; object-fit:cover; border-radius:8px; background:#eee; display:block;}
  .cv .cvt{font-size:12px; font-weight:600; line-height:1.35; margin-top:5px;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;}
  .cv .cvv{font-size:11px; color:var(--sub);}
  .crm-empty{padding:50px 20px; text-align:center; color:var(--sub); background:var(--card);
    border:1px solid var(--line); border-radius:12px; margin-top:14px;}

  .spinner{display:inline-block; width:16px; height:16px; border:2px solid var(--line);
    border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; vertical-align:-3px; margin-right:6px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  @media (prefers-reduced-motion: reduce){.spinner{animation:none;}}

  @media (max-width:760px){
    .thumb{width:88px; height:50px;}
    thead th:nth-child(6), tbody td:nth-child(6),
    thead th:nth-child(7), tbody td:nth-child(7){display:none;}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>유튜브 키워드 랭커<span class="dot">.</span> <span style="font-size:13px;color:var(--sub);font-weight:600;">v4 · 서버 저장</span></h1>
    <p>검색 기록과 연락처가 서버에 저장되어 어느 기기에서든 동일하게 보입니다.</p>
  </header>

  <div class="tabs">
    <button class="tab on" data-view="searchView">🔍 키워드 검색</button>
    <button class="tab" data-view="crmView">📇 연락처 관리 <span id="crmCount"></span></button>
  </div>

  <!-- ================= 검색 탭 ================= -->
  <div class="view on" id="searchView">
    <div class="panel">
      <div class="row">
        <div class="field grow">
          <label for="keyword">검색 키워드</label>
          <input type="text" id="keyword" placeholder="예: 전화영어, 화상영어, 영어회화">
        </div>
        <button class="btn-main" id="searchBtn">검색</button>
        <button class="btn-ghost" id="keyBtn" title="접속 설정">⚙️ 접속 설정</button>
      </div>

      <div class="filters">
        <div class="field">
          <label for="fetchOrder">수집 기준 (API 검색 순서)</label>
          <select id="fetchOrder">
            <option value="relevance">관련성 (기본)</option>
            <option value="date">최신 업로드</option>
            <option value="viewCount">조회수</option>
            <option value="rating">평점</option>
          </select>
        </div>
        <div class="field">
          <label for="period">업로드 기간</label>
          <select id="period">
            <option value="">전체</option>
            <option value="7">최근 7일</option>
            <option value="30">최근 1개월</option>
            <option value="90">최근 3개월</option>
            <option value="365">최근 1년</option>
          </select>
        </div>
        <div class="field">
          <label for="maxResults">수집 개수</label>
          <select id="maxResults">
            <option value="25">25개</option>
            <option value="50">50개</option>
            <option value="100" selected>100개</option>
          </select>
        </div>
        <div class="field">
          <label for="subCap">구독자 상한 (대형 채널 제외)</label>
          <select id="subCap">
            <option value="">제한 없음</option>
            <option value="1000">1천 이하</option>
            <option value="10000">1만 이하</option>
            <option value="100000">10만 이하</option>
            <option value="1000000">100만 이하</option>
          </select>
        </div>
      </div>
      <p class="hint">
        검색 결과는 서버 데이터베이스에 저장되어 <b>PC·노트북·폰 어디서든 같은 기록</b>을 볼 수 있습니다 (최근 300건 보관).
        기록을 다시 열 때는 API를 사용하지 않습니다. 표의 제목(조회수·구독자 등)을 클릭하면 그 기준으로 정렬됩니다.
      </p>
    </div>

    <div class="panel">
      <div class="history-head">
        <h2>📁 검색 기록 <span id="histCount" style="color:var(--sub);font-weight:600;font-size:13px;"></span></h2>
        <button class="btn-ghost" id="clearHistBtn">전체 삭제</button>
      </div>
      <div class="history-list" id="historyList"></div>
      <p class="history-empty" id="historyEmpty">아직 저장된 검색 기록이 없습니다. 검색하면 자동으로 저장됩니다.</p>
    </div>

    <div class="status" id="status"></div>
    <div id="results"></div>
  </div>

  <!-- ================= 연락처 관리 탭 ================= -->
  <div class="view" id="crmView">
    <div class="crm-head">
      <div class="crm-filters" id="crmFilters"></div>
      <button class="btn-ghost" id="csvBtn">📥 엑셀(CSV) 내보내기</button>
    </div>
    <div id="crmList"></div>
  </div>
</div>

<!-- 모달 -->
<div class="overlay" id="overlay">
  <div class="modal" role="dialog" aria-modal="true">
    <div class="modal-head">
      <div class="mtitle" id="modalTitle"></div>
      <button class="modal-close" id="modalClose" aria-label="닫기">×</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
(function(){
  // ============================================================
  // ★ 서버 주소 설정 ★
  // Cloudflare Worker 이름을 "ykr-api"로 만들었다면 그대로 두면 됩니다.
  // 다른 이름으로 만들었다면 아래 주소의 ykr-api 부분만 바꿔주세요.
  // ============================================================
  const API_BASE = 'https://ykr-api.marketwave99.workers.dev';

  const $ = id => document.getElementById(id);
  const LS_AUTH = 'ykr_auth';

  const STATUSES = [
    { k:'미연락',   bg:'#EEF1F5', fg:'#5B6472' },
    { k:'제안발송', bg:'#EBF1FE', fg:'#2B5FD9' },
    { k:'회신옴',   bg:'#FBF3E4', fg:'#B7791F' },
    { k:'협업진행', bg:'#E4F5F0', fg:'#0E8A6D' },
    { k:'보류',     bg:'#F3F0FA', fg:'#7C5CBF' }
  ];
  function stInfo(k){ return STATUSES.find(s => s.k === k) || STATUSES[0]; }
  function stBadge(k){
    const s = stInfo(k);
    return `<span class="st-badge" style="background:${s.bg};color:${s.fg};">${s.k}</span>`;
  }
  function stSelect(cid, cur){
    return `<select class="st-select" data-cid="${cid}">` +
      STATUSES.map(s => `<option value="${s.k}"${s.k===cur?' selected':''}>${s.k}</option>`).join('') +
      `</select>`;
  }

  let videos = [];
  let channels = {};
  let currentSort = 'views';
  let histList = [];
  let contactsCache = {};
  let crmFilter = '전체';

  /* ---------- 서버 통신 ---------- */
  function getAuth(){ try{ return localStorage.getItem(LS_AUTH) || ''; }catch(e){ return ''; } }
  function saveAuth(t){ try{ localStorage.setItem(LS_AUTH, t); }catch(e){} }
  async function api(path, opts = {}){
    let res;
    try{
      res = await fetch(API_BASE + path, {
        method: opts.method || 'GET',
        headers: { 'Content-Type':'application/json', 'X-Auth': getAuth() },
        body: opts.body ? JSON.stringify(opts.body) : undefined
      });
    }catch(e){
      throw new Error('서버에 연결할 수 없습니다. 인터넷 연결과 서버 주소(API_BASE)를 확인하세요.');
    }
    let data = null;
    try{ data = await res.json(); }catch(e){}
    if(res.status === 401){
      refreshKeyUI();
      openKeyModal();
      throw new Error((data && data.error) || '접속 비밀번호가 올바르지 않습니다.');
    }
    if(!res.ok) throw new Error((data && data.error) || ('서버 오류 (' + res.status + ')'));
    return data;
  }

  /* ---------- 탭 ---------- */
  document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(x => x.classList.remove('on'));
      document.querySelectorAll('.view').forEach(x => x.classList.remove('on'));
      t.classList.add('on');
      $(t.dataset.view).classList.add('on');
      if(t.dataset.view === 'crmView') renderCrm();
    });
  });

  /* ---------- 접속 설정 ---------- */
  function refreshKeyUI(){
    const has = !!getAuth();
    const b = $('keyBtn');
    b.className = 'btn-ghost ' + (has ? 'key-ok' : 'key-need');
    b.textContent = has ? '⚙️ 접속 설정 ✓' : '⚙️ 접속 비밀번호 필요';
  }
  $('keyBtn').addEventListener('click', openKeyModal);
  function openKeyModal(){
    $('modalTitle').innerHTML = `⚙️ 접속 설정
      <div class="msub">서버에 설정한 접속 비밀번호(AUTH_TOKEN)를 입력하세요. 한 번만 저장하면 이 기기에서 계속 사용됩니다.</div>`;
    $('modalBody').innerHTML = `
      <div class="contact-sec">
        <input type="password" id="authInput" style="width:100%;" placeholder="접속 비밀번호">
        <div class="memo-actions">
          <button class="btn-save" id="authSaveBtn">저장하고 연결</button>
        </div>
        <p class="hint" style="margin-top:14px;">
          유튜브 API 키는 서버(Cloudflare Worker)에 안전하게 보관되어 있어 여기서 입력할 필요가 없습니다.<br>
          비밀번호는 Worker의 Settings → Variables & Secrets → AUTH_TOKEN 값과 같아야 합니다.
        </p>
      </div>`;
    overlay.classList.add('show');
    $('authInput').focus();
    $('authInput').addEventListener('keydown', e => { if(e.key==='Enter') $('authSaveBtn').click(); });
    $('authSaveBtn').addEventListener('click', async () => {
      const t = $('authInput').value.trim();
      if(!t){ alert('접속 비밀번호를 입력하세요.'); return; }
      saveAuth(t);
      refreshKeyUI();
      closeModal();
      bootstrap();
    });
  }

  /* ---------- 초기 데이터 로딩 ---------- */
  async function bootstrap(){
    setStatus('<span class="spinner"></span>서버에서 데이터를 불러오는 중...');
    try{
      const [hist, contacts] = await Promise.all([ api('/api/history'), api('/api/contacts') ]);
      histList = hist || [];
      contactsCache = contacts || {};
      renderHist();
      refreshCrmCount();
      setStatus(histList.length ? '서버 연결 완료. 검색 기록을 클릭하면 저장된 결과가 열립니다.' : '서버 연결 완료. 첫 검색을 시작해 보세요.');
      maybeMigrateLocal();
    }catch(e){
      setStatus('서버 연결 오류: ' + escapeHtml(e.message), true);
    }
  }

  // v3(브라우저 저장)에서 쓰던 연락처가 있으면 서버로 1회 이전
  async function maybeMigrateLocal(){
    let old = null;
    try{ old = JSON.parse(localStorage.getItem('ykr_contacts') || 'null'); }catch(e){}
    if(!old || !Object.keys(old).length) return;
    if(!confirm(`이 브라우저에 저장된 기존 연락처 ${Object.keys(old).length}건을 서버로 옮길까요?\n(한 번만 실행됩니다)`)) return;
    try{
      for(const cid of Object.keys(old)){
        if(!contactsCache[cid]){
          await api('/api/contacts', { method:'POST', body:{ cid, data: old[cid] } });
          contactsCache[cid] = old[cid];
        }
      }
      localStorage.setItem('ykr_contacts_backup', JSON.stringify(old));
      localStorage.removeItem('ykr_contacts');
      refreshCrmCount();
      alert('이전 완료! 이제 어느 기기에서든 같은 연락처가 보입니다.');
    }catch(e){
      alert('이전 중 오류: ' + e.message);
    }
  }

  /* ---------- 검색 기록 ---------- */
  let histExpanded = false;
  const HIST_SHOW = 5;
  function renderHist(){
    $('histCount').textContent = histList.length ? `(${histList.length})` : '';
    $('historyEmpty').style.display = histList.length ? 'none' : 'block';
    const shown = histExpanded ? histList : histList.slice(0, HIST_SHOW);
    let html = shown.map(h => `
      <div class="hitem" data-id="${h.id}">
        <span class="kw">${escapeHtml(h.keyword)}</span>
        <span class="hmeta">${fmtDateTime(h.ts)} · ${h.video_count}개 · ${h.order_label || ''}${h.period_label ? ' · ' + h.period_label : ''}</span>
        <button class="btn-del" data-act="del">삭제</button>
      </div>
    `).join('');
    if(histList.length > HIST_SHOW){
      html += histExpanded
        ? `<button class="btn-more" id="histMoreBtn">▲ 접기 (최근 ${HIST_SHOW}개만 보기)</button>`
        : `<button class="btn-more" id="histMoreBtn">▼ 더보기 (${histList.length - HIST_SHOW}개 더 있음)</button>`;
    }
    $('historyList').innerHTML = html;
    const moreBtn = $('histMoreBtn');
    if(moreBtn){
      moreBtn.addEventListener('click', e => {
        e.stopPropagation();
        histExpanded = !histExpanded;
        renderHist();
      });
    }
  }
  $('historyList').addEventListener('click', async e => {
    const item = e.target.closest('.hitem'); if(!item) return;
    const id = item.dataset.id;
    const btn = e.target.closest('button');
    if(btn && btn.dataset.act === 'del'){
      if(!confirm('이 검색 기록을 삭제할까요?')) return;
      try{
        await api('/api/history/' + id, { method:'DELETE' });
        histList = histList.filter(h => h.id !== id);
        renderHist();
      }catch(err){ setStatus('삭제 오류: ' + escapeHtml(err.message), true); }
      return;
    }
    setStatus('<span class="spinner"></span>저장된 결과를 불러오는 중...');
    try{
      const h = await api('/api/history/' + id);
      videos = h.videos;
      channels = h.channels || {};
      $('keyword').value = h.keyword;
      setStatus(`"${escapeHtml(h.keyword)}" 저장된 결과 ${videos.length}개 <span class="from-cache">서버 저장본 · API 미사용</span> — ${fmtDateTime(h.ts)} 수집`);
      render();
      $('results').scrollIntoView({behavior:'smooth', block:'start'});
    }catch(err){
      setStatus('불러오기 오류: ' + escapeHtml(err.message), true);
    }
  });
  $('clearHistBtn').addEventListener('click', async () => {
    if(!histList.length) return;
    if(!confirm('서버에 저장된 검색 기록을 모두 삭제할까요? (연락처 관리 데이터는 유지됩니다)')) return;
    try{
      await api('/api/history', { method:'DELETE' });
      histList = [];
      renderHist();
    }catch(err){ setStatus('삭제 오류: ' + escapeHtml(err.message), true); }
  });

  /* ---------- 검색 ---------- */
  $('searchBtn').addEventListener('click', run);
  $('keyword').addEventListener('keydown', e => { if(e.key==='Enter') run(); });

  function setStatus(msg, isError){
    const s = $('status');
    s.className = 'status' + (isError ? ' error' : '');
    s.innerHTML = msg;
  }

  async function run(){
    if(!getAuth()){
      setStatus('먼저 접속 비밀번호를 설정해 주세요.', true);
      openKeyModal();
      return;
    }
    const kw = $('keyword').value.trim();
    if(!kw){ setStatus('검색 키워드를 입력하세요.', true); return; }

    $('searchBtn').disabled = true;
    setStatus('<span class="spinner"></span>서버에서 검색·수집 중... (수집 개수에 따라 5~20초)');
    $('results').innerHTML = '';

    try{
      const days = $('period').value;
      const order = $('fetchOrder').value;
      const r = await api('/api/search', {
        method:'POST',
        body:{
          keyword: kw,
          order,
          periodDays: +days || 0,
          max: +$('maxResults').value,
          subCap: +$('subCap').value || 0
        }
      });
      videos = r.videos;
      channels = r.channels || {};

      const orderLabels = {relevance:'관련성', date:'최신 업로드', viewCount:'조회수', rating:'평점'};
      const periodLabels = {'7':'최근 7일','30':'최근 1개월','90':'최근 3개월','365':'최근 1년'};
      histList.unshift({
        id: r.id, keyword: kw, ts: r.ts,
        order_label: orderLabels[order] || order,
        period_label: periodLabels[days] || '',
        video_count: videos.length
      });
      renderHist();

      setStatus(`"${escapeHtml(kw)}" 검색 결과 ${videos.length}개 · 서버에 저장됨 · 표의 제목(조회수·구독자 등)을 클릭하면 정렬됩니다.`);
      render();
    }catch(err){
      setStatus('오류: ' + escapeHtml(err.message), true);
    }finally{
      $('searchBtn').disabled = false;
    }
  }

  /* ---------- 결과 렌더링 ---------- */
  function render(){
    if(!videos.length) return;
    const sorted = [...videos].sort((a,b) => {
      switch(currentSort){
        case 'subs':   return (b.subs??-1) - (a.subs??-1);
        case 'date':   return new Date(b.published) - new Date(a.published);
        case 'likes':  return b.likes - a.likes;
        case 'engage': return b.engage - a.engage;
        case 'ratio':  return ratioVal(b) - ratioVal(a);
        default:       return b.views - a.views;
      }
    });

    const rows = sorted.map((v, i) => {
      const gem = v.subs !== null && v.subs > 0 && v.ratio >= 3;
      const rec = contactsCache[v.channelId];
      return `<tr>
        <td class="rank${i<3?' top':''}">${i+1}</td>
        <td><a href="https://www.youtube.com/watch?v=${v.vid}" target="_blank" rel="noopener"><img class="thumb" src="${v.thumb}" alt="" loading="lazy"></a></td>
        <td>
          <a class="vtitle" href="https://www.youtube.com/watch?v=${v.vid}" target="_blank" rel="noopener">${escapeHtml(v.title)}${gem?'<span class="badge-gem">숨은 보석</span>':''}</a>
          <div class="vmeta">${fmtDate(v.published)} · ${v.duration}</div>
        </td>
        <td>
          <a class="ch" href="https://www.youtube.com/channel/${v.channelId}" target="_blank" rel="noopener">${escapeHtml(v.channel)}</a><br>
          <button class="btn-contact${rec ? ' has-rec' : ''}" data-cid="${v.channelId}">📇 ${rec ? rec.status : '연락처'}</button>
        </td>
        <td class="num">${fmtNum(v.views)}</td>
        <td class="num">${v.subs===null ? '<span title="비공개">비공개</span>' : fmtNum(v.subs)}</td>
        <td class="num">${fmtNum(v.likes)}</td>
        <td class="num">${(v.engage*100).toFixed(1)}%</td>
        <td class="num ${v.ratio>=3?'ratio-hi':''}">${v.ratio===-1?'∞':v.ratio.toFixed(1)+'배'}</td>
        <td><button class="btn-cmt${v.comments?' cached':''}" data-vid="${v.vid}">댓글 ${v.cmtCount?fmtNum(v.cmtCount):''}</button></td>
      </tr>`;
    }).join('');

    const on = k => currentSort === k ? ' on' : '';
    $('results').innerHTML = `<table>
      <thead><tr>
        <th>순위</th><th>썸네일</th>
        <th class="sortable${on('date')}" data-sort="date" title="클릭하면 최신순 정렬">영상 (최신순)</th>
        <th>채널</th>
        <th class="sortable${on('views')}" data-sort="views" style="text-align:right">조회수</th>
        <th class="sortable${on('subs')}" data-sort="subs" style="text-align:right">구독자</th>
        <th class="sortable${on('likes')}" data-sort="likes" style="text-align:right">좋아요</th>
        <th class="sortable${on('engage')}" data-sort="engage" style="text-align:right">참여율</th>
        <th class="sortable${on('ratio')}" data-sort="ratio" style="text-align:right">떡상 지수</th>
        <th>댓글</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;

    $('results').querySelectorAll('th.sortable').forEach(th => {
      th.addEventListener('click', () => { currentSort = th.dataset.sort; render(); });
    });
    $('results').querySelectorAll('.btn-cmt').forEach(btn => {
      btn.addEventListener('click', () => openComments(btn.dataset.vid));
    });
    $('results').querySelectorAll('.btn-contact').forEach(btn => {
      btn.addEventListener('click', () => openContacts(btn.dataset.cid));
    });
  }
  function ratioVal(v){ return v.ratio === -1 ? Infinity : v.ratio; }

  /* ---------- 연락처 추출 ---------- */
  function extractContacts(desc){
    const emails = [...new Set(desc.match(/[\w.+-]+@[\w-]+(?:\.[\w-]+)+/g) || [])];
    const phones = [...new Set(desc.match(/01[016789][-.\s]?\d{3,4}[-.\s]?\d{4}/g) || [])];
    const urls = [...new Set(desc.match(/https?:\/\/[^\s"'<>),]+/g) || [])];
    return { emails, phones, urls };
  }
  function urlLabel(u){
    if(/instagram\.com/i.test(u)) return '인스타그램';
    if(/open\.kakao\.com/i.test(u)) return '오픈카톡';
    if(/pf\.kakao\.com/i.test(u)) return '카카오 채널';
    if(/blog\.naver\.com/i.test(u)) return '네이버 블로그';
    if(/cafe\.naver\.com/i.test(u)) return '네이버 카페';
    if(/smartstore\.naver\.com/i.test(u)) return '스마트스토어';
    if(/litt\.ly|linktr\.ee|link\.inpock/i.test(u)) return '링크 모음';
    if(/youtube\.com|youtu\.be/i.test(u)) return '유튜브';
    if(/twitter\.com|x\.com/i.test(u)) return 'X(트위터)';
    if(/facebook\.com/i.test(u)) return '페이스북';
    if(/tiktok\.com/i.test(u)) return '틱톡';
    return '링크';
  }
  function contactRow(label, value, isLink){
    const shown = isLink
      ? `<a href="${escapeHtml(value)}" target="_blank" rel="noopener">${escapeHtml(value)}</a>`
      : escapeHtml(value);
    return `<div class="contact-row">
      <span class="contact-val"><b>${label}</b>${shown}</span>
      <button class="copy-btn" data-copy="${escapeHtml(value)}">복사</button>
    </div>`;
  }
  function contactRowsHtml(rec){
    let html = '';
    if(rec.emails && rec.emails.length){
      html += `<div class="contact-sec"><h3>✉️ 이메일</h3>${rec.emails.map(e => contactRow('이메일', e, false)).join('')}</div>`;
    }
    if(rec.phones && rec.phones.length){
      html += `<div class="contact-sec"><h3>📞 전화번호</h3>${rec.phones.map(p => contactRow('전화', p, false)).join('')}</div>`;
    }
    if(rec.urls && rec.urls.length){
      html += `<div class="contact-sec"><h3>🔗 링크</h3>${rec.urls.map(u => contactRow(urlLabel(u), u, true)).join('')}</div>`;
    }
    return html;
  }

  /* ---------- 연락처 저장 (서버) ---------- */
  function snapshotChannel(cid){
    const v = videos.find(x => x.channelId === cid);
    const info = channels[cid] || {};
    const ext = extractContacts(info.desc || '');
    const chVideos = videos.filter(x => x.channelId === cid)
      .sort((a,b) => b.views - a.views).slice(0,4)
      .map(x => ({ vid:x.vid, title:x.title, thumb:x.thumb, views:x.views }));
    return {
      name: v ? v.channel : '채널',
      subs: v ? v.subs : null,
      handle: info.handle || '',
      emails: ext.emails, phones: ext.phones, urls: ext.urls,
      videos: chVideos
    };
  }
  async function upsertContact(cid, patch, withSnapshot){
    const prev = contactsCache[cid] || {};
    const snap = withSnapshot ? snapshotChannel(cid) : {};
    const rec = {
      name:'채널', memo:'', status:'미연락', subs:null, handle:'',
      emails:[], phones:[], urls:[], videos:[],
      added: prev.added || Date.now(),
      ...prev, ...snap, ...patch,
      ts: Date.now()
    };
    contactsCache[cid] = rec;
    refreshCrmCount();
    try{
      await api('/api/contacts', { method:'POST', body:{ cid, data: rec } });
    }catch(e){
      alert('서버 저장 실패: ' + e.message);
    }
    return rec;
  }
  async function deleteContact(cid){
    delete contactsCache[cid];
    refreshCrmCount();
    try{
      await api('/api/contacts/' + encodeURIComponent(cid), { method:'DELETE' });
    }catch(e){
      alert('서버 삭제 실패: ' + e.message);
    }
  }
  function refreshCrmCount(){
    const n = Object.keys(contactsCache).length;
    $('crmCount').textContent = n ? `(${n})` : '';
  }

  /* ---------- 연락처 모달 (검색 탭에서) ---------- */
  function openContacts(cid){
    const v = videos.find(x => x.channelId === cid);
    const info = channels[cid];
    const rec = contactsCache[cid];
    const chName = v ? v.channel : (rec ? rec.name : '채널');
    const handle = (info && info.handle) || (rec && rec.handle) || '';
    const aboutUrl = handle
      ? `https://www.youtube.com/${handle}/about`
      : `https://www.youtube.com/channel/${cid}/about`;

    $('modalTitle').innerHTML = `📇 ${escapeHtml(chName)}
      <div class="msub">상태와 메모를 저장하면 "연락처 관리" 탭에 자동 등록됩니다 (서버 저장).</div>`;
    overlay.classList.add('show');

    const ext = info ? extractContacts(info.desc) : { emails: rec?.emails||[], phones: rec?.phones||[], urls: rec?.urls||[] };
    let html = '';

    html += `<div class="contact-sec memo-box"><h3>📝 상태 & 메모</h3>
      <div class="memo-actions" style="margin:0 0 8px;">
        ${stSelect(cid, rec ? rec.status : '미연락')}
      </div>
      <textarea id="memoInput" placeholder="정보 탭에서 확인한 이메일, 인스타 DM 계정, 연락 이력 등을 자유롭게 적어두세요.">${rec ? escapeHtml(rec.memo) : ''}</textarea>
      <div class="memo-actions">
        <button class="btn-save" id="memoSaveBtn">저장</button>
        ${rec ? `<button class="copy-btn" id="memoCopyBtn">메모 복사</button><span class="memo-note">${fmtDateTime(rec.ts)} 저장됨</span>` : '<span class="memo-note">저장하면 연락처 관리 탭에 등록됩니다.</span>'}
      </div>
    </div>`;

    html += contactRowsHtml({ emails: ext.emails, phones: ext.phones, urls: ext.urls });

    if(!ext.emails.length && !ext.phones.length && !ext.urls.length){
      html += `<p class="contact-none">소개글에서 이메일·전화·링크를 찾지 못했습니다. 아래 버튼으로 채널 정보 탭의 "이메일 주소 보기"를 확인해 보세요 (보안문자 입력 필요).</p>`;
    }

    html += `<div class="contact-sec"><a class="btn-about" href="${aboutUrl}" target="_blank" rel="noopener">유튜브 채널 정보 탭 열기 →</a></div>`;

    if(info && info.desc.trim()){
      html += `<div class="contact-sec"><h3>📄 채널 소개글 전문</h3><div class="contact-desc">${escapeHtml(info.desc)}</div></div>`;
    }

    $('modalBody').innerHTML = html;
    $('modalBody').querySelectorAll('.copy-btn[data-copy]').forEach(btn => {
      btn.addEventListener('click', () => copyText(btn.dataset.copy, btn));
    });
    const saveBtn = $('memoSaveBtn');
    saveBtn.addEventListener('click', async () => {
      const st = $('modalBody').querySelector('.st-select').value;
      saveBtn.disabled = true;
      await upsertContact(cid, { memo: $('memoInput').value.trim(), status: st }, !!info);
      saveBtn.disabled = false;
      saveBtn.textContent = '저장됨 ✓';
      setTimeout(() => { saveBtn.textContent = '저장'; }, 1400);
      render();
    });
    const copyBtn = $('memoCopyBtn');
    if(copyBtn) copyBtn.addEventListener('click', () => copyText($('memoInput').value, copyBtn));
  }

  /* ---------- 연락처 관리 탭 ---------- */
  function renderCrm(){
    const list = Object.keys(contactsCache).map(cid => ({ cid, ...contactsCache[cid] }))
      .sort((a,b) => b.ts - a.ts);

    const counts = { '전체': list.length };
    STATUSES.forEach(s => counts[s.k] = list.filter(c => c.status === s.k).length);
    $('crmFilters').innerHTML = ['전체', ...STATUSES.map(s => s.k)].map(k =>
      `<button class="fchip${crmFilter===k?' on':''}" data-f="${k}">${k} ${counts[k]||0}</button>`
    ).join('');
    $('crmFilters').querySelectorAll('.fchip').forEach(b => {
      b.addEventListener('click', () => { crmFilter = b.dataset.f; renderCrm(); });
    });

    const shown = crmFilter === '전체' ? list : list.filter(c => c.status === crmFilter);
    if(!shown.length){
      $('crmList').innerHTML = `<div class="crm-empty">${list.length ? '이 상태의 채널이 없습니다.' :
        '아직 등록된 연락처가 없습니다.<br>검색 탭에서 채널의 📇 버튼을 눌러 상태나 메모를 저장하면 여기에 쌓입니다.'}</div>`;
      return;
    }

    $('crmList').innerHTML = shown.map(c => {
      const handle = c.handle || '';
      const chUrl = handle ? `https://www.youtube.com/${handle}` : `https://www.youtube.com/channel/${c.cid}`;
      const aboutUrl = chUrl + '/about';
      const vids = (c.videos||[]).map(v => `
        <a class="cv" href="https://www.youtube.com/watch?v=${v.vid}" target="_blank" rel="noopener">
          <img src="${v.thumb}" alt="" loading="lazy">
          <div class="cvt">${escapeHtml(v.title)}</div>
          <div class="cvv">조회수 ${fmtNum(v.views)}</div>
        </a>`).join('');
      return `<div class="card" data-cid="${c.cid}">
        <div class="card-head">
          ${stBadge(c.status)}
          <a class="cname" href="${chUrl}" target="_blank" rel="noopener">${escapeHtml(c.name)}</a>
          <span class="cmeta">${c.subs != null ? '구독자 ' + fmtNum(c.subs) + ' · ' : ''}${fmtDateTime(c.ts)} 업데이트</span>
          ${stSelect(c.cid, c.status)}
          <button class="btn-del" data-act="del">삭제</button>
        </div>
        ${contactRowsHtml(c)}
        <div class="contact-sec memo-box"><h3>📝 메모</h3>
          <textarea data-role="memo">${escapeHtml(c.memo||'')}</textarea>
          <div class="memo-actions">
            <button class="btn-save" data-act="save">메모 저장</button>
            <button class="copy-btn" data-act="copymemo">메모 복사</button>
            <a class="btn-about" href="${aboutUrl}" target="_blank" rel="noopener">채널 정보 탭 →</a>
          </div>
        </div>
        ${vids ? `<div class="card-videos">${vids}</div>` : ''}
      </div>`;
    }).join('');

    $('crmList').querySelectorAll('.card').forEach(card => {
      const cid = card.dataset.cid;
      card.querySelector('.st-select').addEventListener('change', async e => {
        await upsertContact(cid, { status: e.target.value }, false);
        renderCrm();
        render();
      });
      card.querySelector('[data-act="del"]').addEventListener('click', async () => {
        if(confirm('이 채널을 연락처 관리에서 삭제할까요?')){
          await deleteContact(cid);
          renderCrm();
          render();
        }
      });
      card.querySelector('[data-act="save"]').addEventListener('click', async e => {
        e.target.disabled = true;
        await upsertContact(cid, { memo: card.querySelector('[data-role="memo"]').value.trim() }, false);
        e.target.disabled = false;
        e.target.textContent = '저장됨 ✓';
        setTimeout(() => { e.target.textContent = '메모 저장'; }, 1400);
      });
      card.querySelector('[data-act="copymemo"]').addEventListener('click', e => {
        copyText(card.querySelector('[data-role="memo"]').value, e.target);
      });
      card.querySelectorAll('.copy-btn[data-copy]').forEach(btn => {
        btn.addEventListener('click', () => copyText(btn.dataset.copy, btn));
      });
    });
  }

  /* ---------- CSV 내보내기 ---------- */
  $('csvBtn').addEventListener('click', () => {
    const list = Object.keys(contactsCache).map(cid => ({ cid, ...contactsCache[cid] }));
    if(!list.length){ alert('내보낼 연락처가 없습니다.'); return; }
    const esc = s => '"' + String(s == null ? '' : s).replace(/"/g, '""') + '"';
    const rows = [
      ['채널명','상태','구독자','이메일','전화','링크','메모','채널주소','마지막 업데이트'].map(esc).join(',')
    ];
    list.forEach(c => {
      const chUrl = c.handle ? `https://www.youtube.com/${c.handle}` : `https://www.youtube.com/channel/${c.cid}`;
      rows.push([
        c.name, c.status,
        c.subs != null ? c.subs : '',
        (c.emails||[]).join(' / '),
        (c.phones||[]).join(' / '),
        (c.urls||[]).join(' / '),
        c.memo || '',
        chUrl,
        new Date(c.ts).toLocaleString('ko-KR')
      ].map(esc).join(','));
    });
    const blob = new Blob(['\uFEFF' + rows.join('\r\n')], { type:'text/csv;charset=utf-8;' });
    const a = document.createElement('a');
    const d = new Date();
    a.href = URL.createObjectURL(blob);
    a.download = `유튜버_연락처_${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.csv`;
    a.click();
    URL.revokeObjectURL(a.href);
  });

  /* ---------- 복사 ---------- */
  async function copyText(text, btn){
    let ok = false;
    try{
      await navigator.clipboard.writeText(text);
      ok = true;
    }catch(e){
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      try{ ok = document.execCommand('copy'); }catch(e2){}
      ta.remove();
    }
    const orig = btn.textContent;
    btn.textContent = ok ? '복사됨 ✓' : '복사 실패';
    btn.classList.add('done');
    setTimeout(() => { btn.textContent = orig; btn.classList.remove('done'); }, 1400);
  }

  /* ---------- 모달 공통 ---------- */
  const overlay = $('overlay');
  $('modalClose').addEventListener('click', closeModal);
  overlay.addEventListener('click', e => { if(e.target === overlay) closeModal(); });
  document.addEventListener('keydown', e => { if(e.key === 'Escape') closeModal(); });
  function closeModal(){ overlay.classList.remove('show'); }

  /* ---------- 댓글 모달 ---------- */
  async function openComments(vid){
    const v = videos.find(x => x.vid === vid);
    if(!v) return;
    $('modalTitle').innerHTML = `<a href="https://www.youtube.com/watch?v=${v.vid}" target="_blank" rel="noopener">${escapeHtml(v.title)}</a>
      <div class="msub">${escapeHtml(v.channel)} · 댓글 ${v.cmtCount ? fmtNum(v.cmtCount) + '개' : ''}</div>`;
    overlay.classList.add('show');

    if(v.comments){
      renderComments(v.comments, true);
      return;
    }
    $('modalBody').innerHTML = '<div class="modal-loading"><span class="spinner"></span>댓글을 불러오는 중...</div>';
    try{
      const comments = await api('/api/comments', { method:'POST', body:{ videoId: vid } });
      v.comments = comments;
      renderComments(comments, false);
      render();
    }catch(err){
      $('modalBody').innerHTML = `<div class="modal-loading">오류: ${escapeHtml(err.message)}</div>`;
    }
  }

  function renderComments(comments, fromCache){
    if(!comments.length){
      $('modalBody').innerHTML = '<div class="modal-loading">표시할 댓글이 없습니다.</div>';
      return;
    }
    $('modalBody').innerHTML =
      (fromCache ? '<p style="font-size:12px;color:var(--sub);padding-top:12px;">이번 접속에서 불러온 댓글입니다.</p>' : '') +
      comments.map(c => `
      <div class="cmt">
        <div class="cmt-top">
          <span class="cmt-author">${escapeHtml(c.author)}</span>
          <span class="cmt-date">${fmtDate(c.date)}</span>
          <span class="cmt-likes">👍 ${fmtNum(c.likes)}</span>
        </div>
        <div class="cmt-text">${escapeHtml(c.text)}</div>
        ${c.replies ? `<div class="cmt-replies">답글 ${c.replies}개</div>` : ''}
      </div>
    `).join('');
  }

  /* ---------- 유틸 ---------- */
  function fmtNum(n){
    if(n >= 100000000) return (n/100000000).toFixed(1).replace(/\.0$/,'') + '억';
    if(n >= 10000) return (n/10000).toFixed(1).replace(/\.0$/,'') + '만';
    return n.toLocaleString('ko-KR');
  }
  function fmtDate(iso){
    const d = new Date(iso);
    const diff = (Date.now() - d) / 86400000;
    if(diff < 1) return '오늘';
    if(diff < 30) return Math.floor(diff) + '일 전';
    if(diff < 365) return Math.floor(diff/30) + '개월 전';
    return d.getFullYear() + '.' + String(d.getMonth()+1).padStart(2,'0') + '.' + String(d.getDate()).padStart(2,'0');
  }
  function fmtDateTime(ts){
    const d = new Date(ts);
    return `${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  }
  function escapeHtml(str){
    return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  /* ---------- 초기화 ---------- */
  refreshKeyUI();
  if(getAuth()){
    bootstrap();
  }else{
    setStatus('처음이시군요! ⚙️ 버튼을 눌러 접속 비밀번호를 설정하세요.', false);
    openKeyModal();
  }
})();
</script>
</body>
</html>
